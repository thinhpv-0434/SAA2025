# SwiftLint configuration for SAA2025
# Strict opt-in rule set, tuned for a SwiftUI codebase.
# Docs: https://realm.github.io/SwiftLint/rule-directory.html

included:
  - SAA2025/SAA2025
  - SAA2025Tests

excluded:
  - SAA2025/SAA2025.xcodeproj
  - "**/.build"
  - "**/DerivedData"
  - "**/*.generated.swift"

# ── Rule selection ──────────────────────────────────────────────────────────

disabled_rules:
  - todo                          # leave room for in-progress notes
  - trailing_whitespace           # noisy on diffs in declarative SwiftUI
  - multiple_closures_with_trailing_closure  # SwiftUI builder pattern uses this everywhere

opt_in_rules:
  - anyobject_protocol
  - array_init
  - closure_body_length
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - contains_over_range_nil_comparison
  - convenience_type
  - discouraged_object_literal
  - empty_collection_literal
  - empty_count
  - empty_string
  - empty_xctest_method
  - enum_case_associated_values_count
  - explicit_init
  - extension_access_modifier
  - fallthrough
  - fatal_error_message
  - first_where
  - flatmap_over_map_reduce
  - force_unwrapping
  - function_default_parameter_at_end
  - identical_operands
  - implicitly_unwrapped_optional
  - joined_default_parameter
  - last_where
  - legacy_multiple
  - legacy_random
  - let_var_whitespace
  - literal_expression_end_indentation
  - lower_acl_than_parent
  - modifier_order
  - multiline_arguments
  - multiline_function_chains
  - multiline_parameters
  - nimble_operator
  - no_extension_access_modifier
  - no_grouping_extension
  - nslocalizedstring_key
  - nslocalizedstring_require_bundle
  - number_separator
  - operator_usage_whitespace
  - optional_enum_case_matching
  - overridden_super_call
  - override_in_extension
  - pattern_matching_keywords
  - prefer_self_in_static_references
  - prefer_self_type_over_type_of_self
  - prefer_zero_over_explicit_init
  - private_action
  - private_outlet
  - private_subject
  - prohibited_super_call
  - raw_value_for_camel_cased_codable_enum
  - reduce_into
  - redundant_nil_coalescing
  - redundant_type_annotation
  - single_test_class
  - sorted_first_last
  - static_operator
  - strict_fileprivate
  - strong_iboutlet
  - switch_case_on_newline
  - test_case_accessibility
  - toggle_bool
  - trailing_closure
  - unavailable_function
  - unneeded_parentheses_in_closure_argument
  - unowned_variable_capture
  - untyped_error_in_catch
  - unused_capture_list
  - vertical_parameter_alignment_on_call
  - vertical_whitespace_between_cases
  - weak_delegate
  - xct_specific_matcher
  - yoda_condition

# ── Rule configuration ─────────────────────────────────────────────────────

# SwiftUI views and view bodies are long by nature — relax size limits.
line_length:
  warning: 160
  error: 240
  ignores_function_declarations: true
  ignores_comments: true
  ignores_urls: true

file_length:
  warning: 500
  error: 800
  ignore_comment_only_lines: true

type_body_length:
  warning: 400
  error: 600

function_body_length:
  warning: 80
  error: 140

closure_body_length:
  warning: 60
  error: 100

cyclomatic_complexity:
  warning: 15
  error: 25

nesting:
  type_level: 2
  function_level: 3

identifier_name:
  min_length:
    warning: 2          # allow `id`, `vn`, `en`, `ja`, `q`, `i`
    error: 1
  max_length:
    warning: 50
    error: 60
  excluded:
    - id
    - vn
    - en
    - ja
    - x
    - y
    - r
    - g
    - b
    - q
    - i
    - n
    - t

type_name:
  min_length: 3
  max_length:
    warning: 50
    error: 60

trailing_comma:
  mandatory_comma: false

force_cast: warning      # downgrade — SwiftUI sample code uses it occasionally
force_try: warning
force_unwrapping: warning

multiline_arguments:
  first_argument_location: any_line
  only_enforce_after_first_closure_on_first_line: false

number_separator:
  minimum_length: 5      # require separators only on 5+ digit literals

# ── Custom rules ───────────────────────────────────────────────────────────

custom_rules:
  no_print_in_release:
    name: "print() left in source"
    regex: '(?<!\/\/[ ]?)\bprint\('
    message: "Avoid print(); use os.Logger or remove before merging."
    severity: warning
    excluded: ".*Tests/.*\\.swift"

reporter: "xcode"
